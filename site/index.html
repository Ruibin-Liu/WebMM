<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebMM - MMFF94 Geometry Optimizer</title>
    <script src="https://cdn.jsdelivr.net/npm/3dmol@2.4.0/build/3Dmol-min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }
        h1 {
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }
        .status {
            margin: 15px 0;
            padding: 12px 15px;
            border-radius: 4px;
        }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
        .row { display: flex; gap: 20px; }
        .col { flex: 1; }
        @media (max-width: 700px) { .row { flex-direction: column; } }
        textarea {
            width: 100%;
            height: 180px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-bottom: 10px;
            resize: vertical;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 0 8px 8px 0;
            font-size: 14px;
        }
        button:hover { background-color: #45a049; }
        button.secondary { background-color: #2196F3; }
        button.secondary:hover { background-color: #1e88e5; }
        button.secondary.active { background-color: #1565C0; }
        #viewer {
            width: 100%;
            height: 400px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #f9f9f9;
            position: relative;
        }
        #viewer canvas {
            width: 100% !important;
            height: 100% !important;
        }
        .log {
            background-color: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }
        .log p { margin: 3px 0; }
    </style>
</head>
<body>
    <h1>WebMM - MMFF94 Geometry Optimizer</h1>

    <div class="status">
        <div id="status" class="info">Initializing...</div>
    </div>

    <div class="row">
        <div class="col">
            <h2>Input (SDF Format)</h2>
            <textarea id="sdf-input" placeholder="Paste SDF/MOL file content here..."></textarea>
            <div>
                <button onclick="loadTestFile()">Water</button>
                <button onclick="loadTestFile('acetic')">Acetic Acid</button>
                <button onclick="loadTestFile('benzene')">Benzene</button>
                <button onclick="loadTestFile('ethanol')">Ethanol</button>
                <button onclick="loadTestFile('aniline')">Aniline (N)</button>
                <button onclick="loadTestFile('thiophene')">Thiophene (S)</button>
                <button onclick="loadTestFile('chloroethane')">Chloroethane (Cl)</button>
                <button onclick="loadTestFile('fluorobenzene')">Fluorobenzene (F)</button>
            </div>
        </div>
        <div class="col">
            <h2>3D Viewer</h2>
            <div id="viewer"></div>
            <div>
                <button class="secondary" onclick="setStyle('stick')">Stick</button>
                <button class="secondary" onclick="setStyle('sphere')">Space Fill</button>
                <button class="secondary" onclick="setStyle('ball+stick')">Ball+Stick</button>
                <button class="secondary" onclick="setStyle('line')">Wireframe</button>
                <button class="secondary" onclick="setStyle('cross')">Cross</button>
            </div>
        </div>
    </div>

    <h2>Optimization</h2>
    <div>
        <button onclick="renderFromInput()">Render from Input</button>
        <button onclick="generateInitialCoords()">Generate 3D (ETKDG v3)</button>
        <button onclick="runOptimization()">Optimize (MMFF94s)</button>
    </div>

    <h2>Log</h2>
    <div id="log" class="log"></div>

    <script>
        let optimize_from_sdf, generate_initial_coordinates_wasm;
        let viewer3Dmol;
        let currentStyle = 'stick';

        const statusDiv = document.getElementById('status');
        const logDiv = document.getElementById('log');

        function setStatus(msg, type) {
            statusDiv.textContent = msg;
            statusDiv.className = 'status ' + type;
        }

        function log(msg) {
            const p = document.createElement('p');
            p.textContent = msg;
            logDiv.appendChild(p);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function initViewer() {
            if (typeof $3Dmol === 'undefined') {
                log('3Dmol.js not loaded - viewer disabled');
                return;
            }
            const element = document.getElementById('viewer');
            viewer3Dmol = $3Dmol.createViewer(element, { backgroundColor: '#f9f9f9' });
            log('3D viewer initialized');
        }

        const VIEWER_STYLES = {
            stick: { stick: { radius: 0.15, colors: { C: '#333333', O: '#ff0000', N: '#0066ff', S: '#ffcc00', H: '#ffffff' } } },
            sphere: { sphere: { scale: 1.0, colors: { C: '#333333', O: '#ff0000', N: '#0066ff', S: '#ffcc00', H: '#ffffff' } } },
            'ball+stick': {
                stick: { radius: 0.15, colors: { C: '#333333', O: '#ff0000', N: '#0066ff', S: '#ffcc00', H: '#ffffff' } },
                sphere: { scale: 0.25, colors: { C: '#333333', O: '#ff0000', N: '#0066ff', S: '#ffcc00', H: '#ffffff' } }
            },
            line: { line: { linewidth: 4, colors: { C: '#000000', O: '#ff0000', N: '#0066ff', S: '#ffcc00', H: '#aaaaaa' } } },
            cross: { cross: { radius: 0.2, colors: { C: '#000000', O: '#ff0000', N: '#0066ff', S: '#ffcc00', H: '#aaaaaa' } } }
        };

        function setStyle(style) {
            currentStyle = style;
            if (viewer3Dmol) {
                viewer3Dmol.setStyle({}, VIEWER_STYLES[style]);
                viewer3Dmol.render();
            }
        }

        function renderMolecule(sdfContent) {
            if (!viewer3Dmol || !sdfContent) return;
            try {
                viewer3Dmol.removeAllModels();
                viewer3Dmol.addModel(sdfContent, 'sdf');
                viewer3Dmol.setStyle({}, VIEWER_STYLES[currentStyle]);
                viewer3Dmol.zoomTo();
                viewer3Dmol.render();
            } catch (e) {
                console.error('renderMolecule error:', e);
            }
        }

        function renderMoleculeWithCoords(coords, sdfContent) {
            if (!viewer3Dmol || !coords) return;
            try {
                renderMolecule(sdfContent);
                var atoms = viewer3Dmol.selectedAtoms({});
                for (var i = 0; i < atoms.length; i++) {
                    if (i * 3 + 2 < coords.length) {
                        atoms[i].x = coords[i * 3];
                        atoms[i].y = coords[i * 3 + 1];
                        atoms[i].z = coords[i * 3 + 2];
                    }
                }
                viewer3Dmol.setStyle({}, VIEWER_STYLES[currentStyle]);
                viewer3Dmol.zoomTo();
                viewer3Dmol.render();
            } catch (e) {
                log('renderMoleculeWithCoords error: ' + e.message);
                console.error(e);
            }
        }

        async function initWasm() {
            try {
                const wasmModule = await import('./pkg/webmm.js');
                if (wasmModule.default) await wasmModule.default();
                optimize_from_sdf = wasmModule.optimize_from_sdf;
                generate_initial_coordinates_wasm = wasmModule.generate_initial_coordinates_wasm;
                OptimizationOptions = wasmModule.OptimizationOptions;
                if (!optimize_from_sdf) throw new Error('optimize_from_sdf not found');
                setStatus('Ready', 'success');
                log('WASM module loaded');
            } catch (error) {
                setStatus('Failed: ' + error.message, 'error');
                log(error);
                console.error(error);
            }
        }

        function loadTestFile(name) {
            name = name || 'water';
            var sdf = TEST_MOLECULES[name];
            if (!sdf) return;
            document.getElementById('sdf-input').value = sdf;
            renderMolecule(sdf);
            setStatus('Loaded ' + name, 'success');
            log('Loaded ' + name);
        }

        async function generateInitialCoords() {
            try {
                var sdfContent = document.getElementById('sdf-input').value;
                if (!sdfContent.trim()) { setStatus('Enter SDF first', 'error'); return; }
                setStatus('Generating 3D coords (ETKDG v3)...', 'info');
                log('Starting ETKDG v3');
                var t0 = performance.now();
                var result = await generate_initial_coordinates_wasm(sdfContent);
                var dt = ((performance.now() - t0) / 1000).toFixed(2);
                if (result.get_success()) {
                    setStatus('ETKDG v3 complete', 'success');
                    var nAtoms = typeof result.get_n_atoms === 'function' ? result.get_n_atoms() : result.get_n_atoms;
                    log('Generated in ' + dt + 's, ' + nAtoms + ' atoms');
                    var coords = result.get_coordinates();
                    logCoords('Ours ETKDGv3', coords, sdfContent);
                renderMoleculeWithCoords(coords, sdfContent);
                logCoords('Ours MMFF94s optimized', coords, sdfContent);
                } else {
                    setStatus('ETKDG failed: ' + result.get_error(), 'error');
                    log('ETKDG failed');
                }
            } catch (error) {
                setStatus('Error: ' + error.message, 'error');
                log(error);
            }
        }

        function logCoords(label, coords, sdfContent) {
            var elements = [];
            if (sdfContent) {
                var lines = sdfContent.split('\n');
                var atomCount = parseInt(lines[3].substring(0, 3));
                for (var i = 4; i < 4 + atomCount; i++) {
                    var sym = lines[i].substring(31, 34).trim();
                    elements.push(sym);
                }
            }
            log(label + ' coords (' + (coords.length/3) + ' atoms):');
            for (var i = 0; i < coords.length / 3; i++) {
                var sym = i < elements.length ? elements[i] : '?';
                log('  ' + sym + i + ': ' + coords[i*3].toFixed(4) + ', ' + coords[i*3+1].toFixed(4) + ', ' + coords[i*3+2].toFixed(4));
            }
        }

        async function runOptimization() {
            try {
                var sdfContent = document.getElementById('sdf-input').value;
                if (!sdfContent.trim()) { setStatus('Enter SDF first', 'error'); return; }
                setStatus('Optimizing...', 'info');
                log('Starting MMFF94s optimization');
                var t0 = performance.now();
                var opts = new OptimizationOptions();
                opts.set_max_iterations(500);
                opts.set_max_force(0.01);
                var result = await optimize_from_sdf(sdfContent, opts);
                var dt = ((performance.now() - t0) / 1000).toFixed(2);
                var coords = [];
                for (var i = 0; i < result.n_atoms; i++) {
                    coords.push(result.get_coord(i, 0));
                    coords.push(result.get_coord(i, 1));
                    coords.push(result.get_coord(i, 2));
                }
                renderMoleculeWithCoords(coords, sdfContent);
                if (result.get_converged()) {
                    setStatus('Converged in ' + result.get_iterations() + ' iters (' + dt + 's)', 'success');
                    log('Converged: ' + result.get_iterations() + ' iters, E=' + result.get_final_energy().toFixed(2) + ' kcal/mol');
                } else {
                    setStatus('Max iters reached (' + dt + 's)', 'error');
                    log(result.get_iterations() + ' iters, E=' + result.get_final_energy().toFixed(2) + ' kcal/mol');
                }
            } catch (error) {
                setStatus('Error: ' + error.message, 'error');
                log(error);
            }
        }

        function renderFromInput() {
            var sdf = document.getElementById('sdf-input').value;
            if (sdf.trim()) {
                renderMolecule(sdf);
            }
        }

        document.getElementById('sdf-input').addEventListener('change', function() {
            renderFromInput();
        });

        window.addEventListener('resize', function() {
            if (viewer3Dmol) {
                var element = document.getElementById('viewer');
                var rect = element.getBoundingClientRect();
                viewer3Dmol.setWidth(rect.width);
                viewer3Dmol.setHeight(rect.height);
                viewer3Dmol.render();
            }
        });

        initViewer();
        initWasm();
        loadTestFile('water');
    </script>
</body>
</html>
