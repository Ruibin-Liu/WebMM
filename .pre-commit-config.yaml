# Pre-commit hooks for WebMM (Rust + WASM molecular mechanics)
# Usage:
#   pip install pre-commit
#   pre-commit install
#   pre-commit run --all-files

minimum_pre_commit_version: "2.20"

default_stages: [pre-commit]

repos:
  # ── General file hygiene ──────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: detect-private-key
      - id: check-symlinks

  # ── Rust formatting ──────────────────────────────────────────────
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        args: ["--", "--check"]
        entry: cargo fmt --

  # ── Rust linting (clippy) ───────────────────────────────────────
  - repo: local
    hooks:
      - id: clippy
        name: clippy
        entry: cargo clippy -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-commit]

      - id: cargo-check
        name: cargo check
        entry: cargo check
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-commit]

  # ── WASM build check (uncomment to enable) ──────────────────────
  # - repo: local
  #   hooks:
