<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Dmol.js SDF Viewer Test</title>
    <script src="https://cdn.jsdelivr.net/npm/3dmol@2.4.0/build/3Dmol-min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }
        .row { display: flex; gap: 20px; }
        .col { flex: 1; }
        @media (max-width: 700px) { .row { flex-direction: column; } }
        textarea {
            width: 100%;
            height: 300px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-bottom: 10px;
            resize: vertical;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 0 4px 8px 0;
            font-size: 14px;
        }
        button:hover { background-color: #45a049; }
        button.secondary { background-color: #2196F3; }
        button.secondary:hover { background-color: #1e88e5; }
        #viewer {
            width: 100%;
            height: 400px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #f9f9f9;
            position: relative;
        }
        #viewer canvas {
            width: 100% !important;
            height: 100% !important;
        }
        .status {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
            background-color: #d1ecf1;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <h1>3Dmol.js SDF Viewer Test</h1>
    
    <div class="status" id="status">Loading 3Dmol.js...</div>
    
    <div class="row">
        <div class="col">
            <h2>Input (SDF/MOL Format)</h2>
            <textarea id="sdf-input" placeholder="Paste SDF or MOL file content here..."></textarea>
            <div>
                <button onclick="loadExample('water')">Water</button>
                <button onclick="loadExample('ethanol')">Ethanol</button>
                <button onclick="loadExample('benzene')">Benzene</button>
                <button onclick="loadExample('caffeine')">Caffeine</button>
                <button onclick="loadExample('aspirin')">Aspirin</button>
            </div>
            <div>
                <button class="secondary" onclick="setStyle('stick')">Stick</button>
                <button class="secondary" onclick="setStyle('sphere')">Space Fill</button>
                <button class="secondary" onclick="setStyle('ball+stick')">Ball+Stick</button>
                <button class="secondary" onclick="setStyle('line')">Wireframe</button>
                <button class="secondary" onclick="setStyle('cross')">Cross</button>
            </div>
        </div>
        <div class="col">
            <h2>3D Viewer</h2>
            <div id="viewer"></div>
        </div>
    </div>

        function initViewer() {
            try {
                const element = document.getElementById('viewer');
                const rect = element.getBoundingClientRect();
                const config = { 
                    backgroundColor: '#f9f9f9',
                    width: rect.width,
                    height: rect.height
                };
                viewer = $3Dmol.createViewer(element, config);
                document.getElementById('status').textContent = 'Ready - load a molecule to view';
            } catch (e) {
                document.getElementById('status').textContent = 'Error: ' + e.message;
                console.error(e);
            }
        }

        function renderMolecule() {
            const sdfContent = document.getElementById('sdf-input').value;
            if (!sdfContent.trim()) {
                document.getElementById('status').textContent = 'Please enter SDF content';
                return;
            }
            
            try {
                viewer.removeAllModels();
                viewer.addModel(sdfContent, 'sdf');
                applyStyle();
                viewer.zoomTo();
                viewer.render();
                document.getElementById('status').textContent = 'Molecule loaded';
            } catch (e) {
                document.getElementById('status').textContent = 'Error loading molecule: ' + e.message;
                console.error(e);
            }
        }

        function loadExample(name) {
            const sdf = EXAMPLES[name];
            if (sdf) {
                document.getElementById('sdf-input').value = sdf;
                renderMolecule();
            }
        }

        function setStyle(style) {
            currentStyle = style;
            applyStyle();
        }

        function applyStyle() {
            if (!viewer) return;
            
            const styles = {
                stick: { stick: { radius: 0.15, colors: { C: '#333333', O: '#ff0000', N: '#0066ff', S: '#ffcc00', H: '#ffffff' } } },
                sphere: { sphere: { scale: 1.0, colors: { C: '#333333', O: '#ff0000', N: '#0066ff', S: '#ffcc00', H: '#ffffff' } } },
                'ball+stick': {
                    stick: { radius: 0.15, colors: { C: '#333333', O: '#ff0000', N: '#0066ff', S: '#ffcc00', H: '#ffffff' } },
                    sphere: { scale: 0.25, colors: { C: '#333333', O: '#ff0000', N: '#0066ff', S: '#ffcc00', H: '#ffffff' } }
                },
                line: { line: { linewidth: 4, colors: { C: '#000000', O: '#ff0000', N: '#0066ff', S: '#ffcc00', H: '#aaaaaa' } } },
                cross: { cross: { radius: 0.2, colors: { C: '#000000', O: '#ff0000', N: '#0066ff', S: '#ffcc00', H: '#aaaaaa' } } }
            };
            
            viewer.setStyle({}, styles[currentStyle]);
            viewer.render();
        }

        // Auto-render when text changes (with debounce)
        let timeout;
        document.getElementById('sdf-input').addEventListener('input', function() {
            clearTimeout(timeout);
            timeout = setTimeout(renderMolecule, 500);
        });

        // Handle window resize
        window.addEventListener('resize', function() {
            if (viewer) {
                const element = document.getElementById('viewer');
                const rect = element.getBoundingClientRect();
                viewer.setWidth(rect.width);
                viewer.setHeight(rect.height);
                viewer.render();
            }
        });

        // Initialize on load
        if (typeof $3Dmol !== 'undefined') {
            initViewer();
        } else {
            document.getElementById('status').textContent = 'Waiting for 3Dmol.js...';
            setTimeout(initViewer, 1000);
        }
    </script>
